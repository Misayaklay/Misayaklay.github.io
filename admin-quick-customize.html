<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自定义快捷功能</title>
  <style>
    :root { --brand: #0052D9; --bg: #F3F3F3; --card: #fff; --text1: #0D0D0D; --text2: #4B4B4B; --text3: #9A9A9A; --border: #E7E7E7; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: -apple-system, 'PingFang SC', sans-serif; background: var(--bg); width: 393px; min-height: 852px; }
    .navbar { height: 44px; background: #fff; display: flex; align-items: center; padding: 0 16px; font-size: 17px; font-weight: 600; border-bottom: 1px solid var(--border); }
    .scroll { padding: 16px; }
    .group-title { font-size: 12px; color: var(--text3); padding: 8px 16px 8px; line-height: 1.4; }
    .cell { display: flex; align-items: center; padding: 14px 16px; background: var(--card); border-bottom: 1px solid var(--border); font-size: 15px; }
    .cell:last-child { border-bottom: none; }
    .cell-icon { width: 24px; height: 24px; margin-right: 12px; border-radius: 6px; }
    .cell-title { flex: 1; color: var(--text1); }
    .cell-actions { display: flex; align-items: center; gap: 8px; }
    .switch { width: 48px; height: 28px; background: var(--brand); border-radius: 14px; }
    .tip { font-size: 12px; color: var(--text3); padding: 12px 16px; }
  </style>
</head>
<body>
  <div class="navbar"><span style="margin-right:8px">←</span> 自定义快捷功能</div>
  <div class="scroll">
    <div class="group-title">勾选即使用，所选功能会排到最上方；用箭头调整顺序</div>
    <div class="cell"><div class="cell-icon" style="background:#0052D920"></div><span class="cell-title">员工管理</span><div class="cell-actions">↑ ↓ <div class="switch"></div></div></div>
    <div class="cell"><div class="cell-icon" style="background:#00A87020"></div><span class="cell-title">考勤总览</span><div class="cell-actions">↑ ↓ <div class="switch"></div></div></div>
    <div class="cell"><div class="cell-icon" style="background:#0052D920"></div><span class="cell-title">签到码</span><div class="cell-actions">↑ ↓ <div class="switch"></div></div></div>
    <div class="cell"><div class="cell-icon" style="background:#4B4B4B20"></div><span class="cell-title">企业设置</span><div class="cell-actions">↑ ↓ <div class="switch"></div></div></div>
    <div class="cell"><div class="cell-icon" style="background:#0052D920"></div><span class="cell-title">切换企业</span><div class="cell-actions">↑ ↓ <div class="switch"></div></div></div>
    <div class="cell"><div class="cell-icon" style="background:#ED7B2F20"></div><span class="cell-title">异常考勤</span><div class="cell-actions">↑ ↓ <div class="switch"></div></div></div>
    <div class="cell"><div class="cell-icon" style="background:#ED7B2F20"></div><span class="cell-title">请假审批</span><div class="cell-actions">↑ ↓ <div class="switch"></div></div></div>
    <div class="cell"><div class="cell-icon" style="background:#E34D5920"></div><span class="cell-title">退出审批</span><div class="cell-actions">↑ ↓ <div class="switch"></div></div></div>
    <p class="tip">签到码是否显示仍受管理员权限控制</p>
  </div>
</body>
</html>
