<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --td-brand: #0052D9;
      --td-success: #00A870;
      --td-bg-page: #F3F3F3;
      --td-bg-card: #FFFFFF;
      --td-text-1: #0D0D0D;
      --td-text-2: #4B4B4B;
      --td-text-3: #9A9A9A;
      --td-border: #E7E7E7;
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--td-bg-page);
      height: 852px; width: 393px;
      overflow: hidden;
    }
    .status-bar { height: 44px; background: var(--td-brand); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
    .nav-bar { height: 44px; background: var(--td-brand); display: flex; align-items: center; padding: 0 16px; }
    .tab-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 83px; background: var(--td-bg-card); border-top: 1px solid var(--td-border); display: flex; padding-bottom: 26px; }
    .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 4px; gap: 3px; }
    .tab-label { font-size: 10px; color: var(--td-text-3); }
    .tab-label.active { color: var(--td-brand); }
    .list-item { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--td-border); background: var(--td-bg-card); }
    .list-item:last-child { border-bottom: none; }
    .list-group { background: var(--td-bg-card); border-radius: 10px; overflow: hidden; margin: 0 16px 12px; }
  </style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <span style="font-size:15px;font-weight:600;color:white;">9:41</span>
    <div style="display:flex;gap:6px;align-items:center;">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="white"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="white"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="white"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="white"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.4C13.2 1.5 10.7 0.3 8 0.3C5.3 0.3 2.8 1.5 1 3.4L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="white"/><path d="M8 5.5C9.4 5.5 10.7 6.1 11.6 7L13 5.5C11.7 4.2 9.9 3.4 8 3.4C6.1 3.4 4.3 4.2 3 5.5L4.4 7C5.3 6.1 6.6 5.5 8 5.5Z" fill="white"/><circle cx="8" cy="10" r="1.5" fill="white"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" stroke-opacity="0.5"/><rect x="2" y="2" width="16" height="8" rx="2" fill="white"/></svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <span style="font-size:17px;font-weight:600;color:white;flex:1;text-align:center;">个人中心</span>
  </div>

  <!-- Scrollable Content -->
  <div style="overflow-y:auto;height:calc(852px - 44px - 44px - 83px);">
    
    <!-- Profile Header -->
    <div style="background:linear-gradient(135deg,#0052D9,#1E6EFF);padding:24px 16px 32px;">
      <div style="display:flex;align-items:center;gap:16px;">
        <div style="position:relative;">
          <div style="width:72px;height:72px;border-radius:36px;background:rgba(255,255,255,0.2);border:2.5px solid rgba(255,255,255,0.6);overflow:hidden;display:flex;align-items:center;justify-content:center;">
            <svg width="44" height="44" viewBox="0 0 44 44" fill="none"><circle cx="22" cy="18" r="9" fill="rgba(255,255,255,0.8)"/><path d="M5 42C5 33.2 13 26 22 26C31 26 39 33.2 39 42" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>
          </div>
          <div style="position:absolute;bottom:0;right:0;width:22px;height:22px;background:#00A870;border-radius:11px;border:2px solid white;display:flex;align-items:center;justify-content:center;">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 9L4.5 6.5L7.5 9.5L10.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <div>
          <div style="font-size:20px;font-weight:700;color:white;margin-bottom:4px;">张三</div>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:12px;color:rgba(255,255,255,0.75);">普通员工</span>
            <span style="width:4px;height:4px;border-radius:2px;background:rgba(255,255,255,0.4);display:inline-block;"></span>
            <span style="font-size:12px;color:rgba(255,255,255,0.75);">极科技有限公司</span>
          </div>
          <div style="margin-top:8px;">
            <span style="background:rgba(255,255,255,0.2);color:white;font-size:11px;padding:3px 10px;border-radius:12px;">在职</span>
          </div>
        </div>
        <div style="margin-left:auto;">
          <div style="width:36px;height:36px;border-radius:18px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2L10.9 6.6L16 7.3L12.3 10.8L13.4 16L9 13.4L4.6 16L5.7 10.8L2 7.3L7.1 6.6L9 2Z" stroke="white" stroke-width="1.5" fill="none"/></svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div style="margin-top:-16px;">
      
      <!-- Basic Info Group -->
      <div class="list-group">
        <div style="padding:12px 16px 4px;font-size:12px;color:var(--td-text-3);font-weight:500;letter-spacing:0.3px;">基本信息</div>
        <div class="list-item">
          <div style="width:32px;height:32px;border-radius:8px;background:#E8F0FD;display:flex;align-items:center;justify-content:center;margin-right:12px;">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="7" r="4" stroke="#0052D9" stroke-width="1.6" fill="none"/><path d="M2.5 17C2.5 13.7 5.4 11 9 11C12.6 11 15.5 13.7 15.5 17" stroke="#0052D9" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>
          </div>
          <div style="flex:1;">
            <div style="font-size:11px;color:var(--td-text-3);">昵称</div>
            <div style="font-size:14px;color:var(--td-text-1);margin-top:1px;">张三</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="list-item">
          <div style="width:32px;height:32px;border-radius:8px;background:#E8F0FD;display:flex;align-items:center;justify-content:center;margin-right:12px;">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="10" rx="2" stroke="#0052D9" stroke-width="1.6" fill="none"/><path d="M2 7L9 11L16 7" stroke="#0052D9" stroke-width="1.6" stroke-linecap="round"/></svg>
          </div>
          <div style="flex:1;">
            <div style="font-size:11px;color:var(--td-text-3);">头像</div>
            <div style="font-size:14px;color:var(--td-text-3);margin-top:1px;">点击更换头像</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="list-item">
          <div style="width:32px;height:32px;border-radius:8px;background:#E8F0FD;display:flex;align-items:center;justify-content:center;margin-right:12px;">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="2" width="12" height="14" rx="2" stroke="#0052D9" stroke-width="1.6" fill="none"/><path d="M6 6H12M6 9H12M6 12H10" stroke="#0052D9" stroke-width="1.6" stroke-linecap="round"/></svg>
          </div>
          <div style="flex:1;">
            <div style="font-size:11px;color:var(--td-text-3);">人脸信息</div>
            <div style="font-size:14px;color:var(--td-success);margin-top:1px;">已采集</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <!-- Company Info Group -->
      <div class="list-group">
        <div style="padding:12px 16px 4px;font-size:12px;color:var(--td-text-3);font-weight:500;letter-spacing:0.3px;">企业信息</div>
        <div class="list-item">
          <div style="width:32px;height:32px;border-radius:8px;background:#E8F7F2;display:flex;align-items:center;justify-content:center;margin-right:12px;">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="6" width="14" height="10" rx="1.5" stroke="#00A870" stroke-width="1.6" fill="none"/><path d="M6 6V4C6 3 6.9 2 8 2H10C11.1 2 12 3 12 4V6" stroke="#00A870" stroke-width="1.6" stroke-linecap="round" fill="none"/><path d="M2 10H16" stroke="#00A870" stroke-width="1.6"/><circle cx="9" cy="10" r="1.5" fill="#00A870"/></svg>
          </div>
          <div style="flex:1;">
            <div style="font-size:11px;color:var(--td-text-3);">所属企业</div>
            <div style="font-size:14px;color:var(--td-text-1);margin-top:1px;">极科技有限公司</div>
          </div>
          <span style="font-size:11px;color:var(--td-success);background:#E8F7F2;padding:3px 8px;border-radius:4px;">在职</span>
        </div>
        <div class="list-item">
          <div style="width:32px;height:32px;border-radius:8px;background:#E8F7F2;display:flex;align-items:center;justify-content:center;margin-right:12px;">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="7" r="3" stroke="#00A870" stroke-width="1.6" fill="none"/><path d="M2 15C2 15 3.5 11 9 11C14.5 11 16 15 16 15" stroke="#00A870" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>
          </div>
          <div style="flex:1;">
            <div style="font-size:11px;color:var(--td-text-3);">我的角色</div>
            <div style="font-size:14px;color:var(--td-text-1);margin-top:1px;">普通员工</div>
          </div>
        </div>
        <div class="list-item" style="cursor:pointer;">
          <div style="width:32px;height:32px;border-radius:8px;background:#FEF0E1;display:flex;align-items:center;justify-content:center;margin-right:12px;">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2L10.8 6.6L16 7.3L12.3 10.8L13.4 16L9 13.4L4.6 16L5.7 10.8L2 7.3L7.2 6.6L9 2Z" stroke="#ED7B2F" stroke-width="1.6" fill="none"/></svg>
          </div>
          <div style="flex:1;">
            <div style="font-size:14px;color:var(--td-text-1);">加入其他企业</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <!-- Other Group -->
      <div class="list-group">
        <div style="padding:12px 16px 4px;font-size:12px;color:var(--td-text-3);font-weight:500;letter-spacing:0.3px;">其他</div>
        <div class="list-item">
          <div style="width:32px;height:32px;border-radius:8px;background:#F5F5F5;display:flex;align-items:center;justify-content:center;margin-right:12px;">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="#9A9A9A" stroke-width="1.6" fill="none"/><path d="M9 5V9L12 11" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round"/></svg>
          </div>
          <span style="flex:1;font-size:14px;color:var(--td-text-1);">关于与隐私协议</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="list-item">
          <div style="width:32px;height:32px;border-radius:8px;background:#F5F5F5;display:flex;align-items:center;justify-content:center;margin-right:12px;">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="#9A9A9A" stroke-width="1.6" fill="none"/><path d="M9 8V12M9 6V6.1" stroke="#9A9A9A" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <span style="flex:1;font-size:14px;color:var(--td-text-1);">帮助与反馈</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <!-- Logout Button -->
      <div style="margin:0 16px 24px;">
        <button style="width:100%;background:var(--td-bg-card);color:#E34D59;border:1.5px solid #E34D59;border-radius:10px;padding:13px;font-size:15px;font-weight:500;cursor:pointer;">退出登录</button>
      </div>

      <!-- Home Indicator -->
      <div style="display:flex;justify-content:center;padding-bottom:8px;">
        <div style="width:134px;height:5px;background:#0D0D0D;border-radius:3px;opacity:0.15;"></div>
      </div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 9L12 3L21 9V20C21 20.6 20.6 21 20 21H15V15H9V21H4C3.4 21 3 20.6 3 20V9Z" stroke="#9A9A9A" stroke-width="1.8" fill="none"/></svg>
      <span class="tab-label">首页</span>
    </div>
    <div class="tab-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="#9A9A9A" stroke-width="1.8" fill="none"/><path d="M8 2V6M16 2V6M3 10H21" stroke="#9A9A9A" stroke-width="1.8" stroke-linecap="round"/><path d="M7 14H9M11 14H13M15 14H17M7 17H9" stroke="#9A9A9A" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span class="tab-label">我的考勤</span>
    </div>
    <div class="tab-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" fill="#0052D9"/><path d="M4 20C4 16.7 7.6 14 12 14C16.4 14 20 16.7 20 20" stroke="#0052D9" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
      <span class="tab-label active">个人中心</span>
    </div>
  </div>
</body>
</html>
