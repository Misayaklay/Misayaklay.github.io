<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理首页</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --td-brand: #0052D9;
      --td-success: #00A870;
      --td-warning: #ED7B2F;
      --td-error: #E34D59;
      --td-bg-page: #F3F3F3;
      --td-bg-card: #FFFFFF;
      --td-text-1: #0D0D0D;
      --td-text-2: #4B4B4B;
      --td-text-3: #9A9A9A;
      --td-border: #E7E7E7;
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--td-bg-page);
      height: 852px; width: 393px;
      overflow: hidden;
    }
    .status-bar { height: 44px; background: var(--td-brand); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
    .nav-bar { height: 44px; background: var(--td-brand); display: flex; align-items: center; padding: 0 16px; }
    .tab-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 83px; background: var(--td-bg-card); border-top: 1px solid var(--td-border); display: flex; padding-bottom: 26px; }
    .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 4px; gap: 3px; }
    .tab-label { font-size: 10px; color: var(--td-text-3); }
    .tab-label.active { color: var(--td-brand); }
    .stat-card { flex: 1; background: var(--td-bg-card); border-radius: 10px; padding: 14px 12px; }
    .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  </style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <span style="font-size:15px;font-weight:600;color:white;">9:41</span>
    <div style="display:flex;gap:6px;align-items:center;">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="white"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="white"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="white"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="white"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" stroke-opacity="0.5"/><rect x="2" y="2" width="16" height="8" rx="2" fill="white"/></svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <div>
      <div style="font-size:11px;color:rgba(255,255,255,0.75);">管理员视图</div>
      <div style="font-size:17px;font-weight:700;color:white;line-height:1.3;">极科技有限公司</div>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;">
      <div style="width:36px;height:36px;border-radius:18px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M16 13V15C16 15.6 15.6 16 15 16H5C4.4 16 4 15.6 4 15V13" stroke="white" stroke-width="1.6" stroke-linecap="round"/><path d="M10 3V13M7 10L10 13L13 10" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div style="overflow-y:auto;height:calc(852px - 44px - 44px - 83px);">
    
    <!-- Header Banner -->
    <div style="background:linear-gradient(135deg,#0052D9,#1E6EFF);padding:16px;padding-bottom:24px;">
      <div style="font-size:13px;color:rgba(255,255,255,0.8);margin-bottom:12px;">2026年02月26日 周四 · 今日出勤概览</div>
      <div style="display:flex;gap:10px;">
        <div style="flex:1;background:rgba(255,255,255,0.15);border-radius:10px;padding:12px;text-align:center;">
          <div style="font-size:28px;font-weight:800;color:white;">42</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.75);margin-top:3px;">应到人数</div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,0.15);border-radius:10px;padding:12px;text-align:center;">
          <div style="font-size:28px;font-weight:800;color:#6EF0C0;">35</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.75);margin-top:3px;">已签到</div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,0.15);border-radius:10px;padding:12px;text-align:center;">
          <div style="font-size:28px;font-weight:800;color:#FFD166;">4</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.75);margin-top:3px;">异常</div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,0.15);border-radius:10px;padding:12px;text-align:center;">
          <div style="font-size:28px;font-weight:800;color:#FF8A8A;">3</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.75);margin-top:3px;">未到</div>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div style="margin-top:-12px;padding:0 16px 12px;">

      <!-- Quick Actions -->
      <div style="background:var(--td-bg-card);border-radius:12px;padding:16px;display:flex;justify-content:space-around;margin-bottom:12px;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
          <div style="width:48px;height:48px;border-radius:12px;background:#E8F0FD;display:flex;align-items:center;justify-content:center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M17 21V19C17 17.3 15.7 16 14 16H10C8.3 16 7 17.3 7 19V21" stroke="#0052D9" stroke-width="1.8" stroke-linecap="round" fill="none"/><circle cx="12" cy="9" r="4" stroke="#0052D9" stroke-width="1.8" fill="none"/></svg>
          </div>
          <span style="font-size:11px;color:var(--td-text-2);">员工管理</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
          <div style="width:48px;height:48px;border-radius:12px;background:#E8F7F2;display:flex;align-items:center;justify-content:center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="#00A870" stroke-width="1.8" fill="none"/><path d="M8 2V6M16 2V6M3 10H21" stroke="#00A870" stroke-width="1.8" stroke-linecap="round"/><path d="M7 14H10M14 14H17M7 17H10" stroke="#00A870" stroke-width="1.8" stroke-linecap="round"/></svg>
          </div>
          <span style="font-size:11px;color:var(--td-text-2);">考勤总览</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
          <div style="width:48px;height:48px;border-radius:12px;background:#FEF0E1;display:flex;align-items:center;justify-content:center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 8V12L15 15" stroke="#ED7B2F" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="9" stroke="#ED7B2F" stroke-width="1.8" fill="none"/></svg>
          </div>
          <span style="font-size:11px;color:var(--td-text-2);">异常考勤</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
          <div style="width:48px;height:48px;border-radius:12px;background:#F5F5F5;display:flex;align-items:center;justify-content:center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="#4B4B4B" stroke-width="1.8" fill="none"/><path d="M12 2V4M12 20V22M2 12H4M20 12H22M4.9 4.9L6.3 6.3M17.7 17.7L19.1 19.1M4.9 19.1L6.3 17.7M17.7 6.3L19.1 4.9" stroke="#4B4B4B" stroke-width="1.8" stroke-linecap="round"/></svg>
          </div>
          <span style="font-size:11px;color:var(--td-text-2);">企业设置</span>
        </div>
      </div>

      <!-- Anomaly Alert -->
      <div style="background:#FFF5E1;border:1px solid #FFD980;border-radius:10px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L2 17H18L10 2Z" fill="#ED7B2F" fill-opacity="0.15" stroke="#ED7B2F" stroke-width="1.6" stroke-linejoin="round"/><path d="M10 8V12" stroke="#ED7B2F" stroke-width="1.8" stroke-linecap="round"/><circle cx="10" cy="14.5" r="1" fill="#ED7B2F"/></svg>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:600;color:#9A4500;">今日有 4 条异常考勤</div>
          <div style="font-size:11px;color:#C47000;margin-top:2px;">迟到 2 人 · 超范围打卡 1 人 · 缺卡 1 人</div>
        </div>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="#ED7B2F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>

      <!-- Today's List -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:14px;font-weight:600;color:var(--td-text-1);">今日实时状态</span>
        <span style="font-size:12px;color:var(--td-brand);">查看全部</span>
      </div>

      <!-- Employee Row -->
      <div style="background:var(--td-bg-card);border-radius:10px;overflow:hidden;margin-bottom:10px;">
        
        <div style="display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--td-border);">
          <div style="width:38px;height:38px;border-radius:19px;background:#D1E3FF;display:flex;align-items:center;justify-content:center;margin-right:10px;font-size:15px;font-weight:600;color:#0052D9;">张</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:500;color:var(--td-text-1);">张三</div>
            <div style="font-size:11px;color:var(--td-text-3);margin-top:1px;">签到 09:02</div>
          </div>
          <span class="tag" style="background:#E8F7F2;color:#00A870;">正常</span>
        </div>
        
        <div style="display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--td-border);">
          <div style="width:38px;height:38px;border-radius:19px;background:#FFE4D1;display:flex;align-items:center;justify-content:center;margin-right:10px;font-size:15px;font-weight:600;color:#ED7B2F;">李</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:500;color:var(--td-text-1);">李四</div>
            <div style="font-size:11px;color:var(--td-text-3);margin-top:1px;">签到 09:22</div>
          </div>
          <span class="tag" style="background:#FEF0E1;color:#ED7B2F;">迟到 22分钟</span>
        </div>

        <div style="display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--td-border);">
          <div style="width:38px;height:38px;border-radius:19px;background:#D1F5E8;display:flex;align-items:center;justify-content:center;margin-right:10px;font-size:15px;font-weight:600;color:#00A870;">王</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:500;color:var(--td-text-1);">王五</div>
            <div style="font-size:11px;color:var(--td-text-3);margin-top:1px;">签到 08:58</div>
          </div>
          <span class="tag" style="background:#E8F7F2;color:#00A870;">正常</span>
        </div>

        <div style="display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--td-border);">
          <div style="width:38px;height:38px;border-radius:19px;background:#FDEAEA;display:flex;align-items:center;justify-content:center;margin-right:10px;font-size:15px;font-weight:600;color:#E34D59;">赵</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:500;color:var(--td-text-1);">赵六</div>
            <div style="font-size:11px;color:var(--td-text-3);margin-top:1px;">未签到</div>
          </div>
          <span class="tag" style="background:#FDECEE;color:#E34D59;">缺卡</span>
        </div>

        <div style="display:flex;align-items:center;padding:12px 14px;">
          <div style="width:38px;height:38px;border-radius:19px;background:#E8F0FD;display:flex;align-items:center;justify-content:center;margin-right:10px;font-size:15px;font-weight:600;color:#0052D9;">孙</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:500;color:var(--td-text-1);">孙七</div>
            <div style="font-size:11px;color:var(--td-text-3);margin-top:1px;">签到 09:01</div>
          </div>
          <span class="tag" style="background:#E8F7F2;color:#00A870;">正常</span>
        </div>
      </div>

      <div style="text-align:center;padding:4px 0 16px;">
        <span style="font-size:13px;color:var(--td-brand);">查看全部 42 名员工</span>
      </div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 9L12 3L21 9V20C21 20.6 20.6 21 20 21H15V15H9V21H4C3.4 21 3 20.6 3 20V9Z" fill="#0052D9"/></svg>
      <span class="tab-label active">首页</span>
    </div>
    <div class="tab-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M17 21V19C17 17.3 15.7 16 14 16H10C8.3 16 7 17.3 7 19V21" stroke="#9A9A9A" stroke-width="1.8" stroke-linecap="round" fill="none"/><circle cx="12" cy="9" r="4" stroke="#9A9A9A" stroke-width="1.8" fill="none"/><path d="M23 21V19C23 17.7 22.2 16.5 21 16M16 3.1C17.2 3.5 18 4.7 18 6C18 7.3 17.2 8.5 16 8.9" stroke="#9A9A9A" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
      <span class="tab-label">员工管理</span>
    </div>
    <div class="tab-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="#9A9A9A" stroke-width="1.8" fill="none"/><path d="M8 2V6M16 2V6M3 10H21" stroke="#9A9A9A" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span class="tab-label">考勤总览</span>
    </div>
    <div class="tab-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="#9A9A9A" stroke-width="1.8" fill="none"/><path d="M19.1 4.9L17.7 6.3M4.9 4.9L6.3 6.3M12 2V4M12 20V22M2 12H4M20 12H22M17.7 17.7L19.1 19.1M4.9 19.1L6.3 17.7" stroke="#9A9A9A" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span class="tab-label">企业设置</span>
    </div>
  </div>
</body>
</html>
