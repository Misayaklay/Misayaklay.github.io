<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --td-brand: #0052D9;
      --td-bg-page: #F3F3F3;
      --td-bg-card: #FFFFFF;
      --td-text-1: #0D0D0D;
      --td-text-2: #4B4B4B;
      --td-text-3: #9A9A9A;
      --td-border: #E7E7E7;
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--td-bg-page);
      height: 852px; width: 393px;
      overflow: hidden;
      position: relative;
    }
    .status-bar {
      height: 44px;
      background: transparent;
      display: flex;
      align-items: center;
      padding: 0 20px;
      justify-content: space-between;
    }
    .status-time { font-size: 15px; font-weight: 600; color: var(--td-text-1); }
    .status-icons { display: flex; gap: 6px; align-items: center; }
  </style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">  
        <rect x="0" y="3" width="3" height="9" rx="1" fill="#0D0D0D"/>
        <rect x="4.5" y="2" width="3" height="10" rx="1" fill="#0D0D0D"/>
        <rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#0D0D0D"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#0D0D0D"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.4C13.2 1.5 10.7 0.3 8 0.3C5.3 0.3 2.8 1.5 1 3.4L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="#0D0D0D"/>
        <path d="M8 5.5C9.4 5.5 10.7 6.1 11.6 7L13 5.5C11.7 4.2 9.9 3.4 8 3.4C6.1 3.4 4.3 4.2 3 5.5L4.4 7C5.3 6.1 6.6 5.5 8 5.5Z" fill="#0D0D0D"/>
        <circle cx="8" cy="10" r="1.5" fill="#0D0D0D"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#0D0D0D" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="#0D0D0D"/>
        <path d="M23 4.5V7.5C23.8 7.2 24.5 6.5 24.5 6C24.5 5.5 23.8 4.8 23 4.5Z" fill="#0D0D0D" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Main Content -->
  <div style="display:flex;flex-direction:column;align-items:center;height:calc(852px - 44px);padding:0 32px;">
    
    <!-- Top spacer -->
    <div style="flex:2"></div>
    
    <!-- Logo Area -->
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:40px;">
      <div style="width:88px;height:88px;background:var(--td-brand);border-radius:26px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 8px 24px rgba(0,82,217,0.3);">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="18" r="8" fill="white" fill-opacity="0.9"/>
          <path d="M8 40C8 32.3 15.2 26 24 26C32.8 26 40 32.3 40 40" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9"/>
          <circle cx="36" cy="36" r="8" fill="white" fill-opacity="0.15" stroke="white" stroke-width="1.5"/>
          <path d="M32 36L35 39L40 33" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 style="margin:0 0 8px;font-size:26px;font-weight:700;color:var(--td-text-1);letter-spacing:-0.5px;">企业员工考勤</h1>
      <p style="margin:0;font-size:14px;color:var(--td-text-3);letter-spacing:0.5px;">定位 · 人脸 · 精准打卡</p>
    </div>

    <!-- Bottom content -->
    <div style="width:100%;">
      <!-- WeChat Login Button -->
      <button style="width:100%;background:var(--td-brand);color:#fff;border:none;border-radius:10px;padding:15px;font-size:17px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 12px rgba(0,82,217,0.35);margin-bottom:16px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M9.5 4C5.4 4 2 7 2 10.8C2 13 3.1 14.9 4.8 16.2L4 19L7.1 17.4C7.8 17.6 8.6 17.7 9.5 17.7C9.3 17.2 9.2 16.7 9.2 16.1C9.2 12.7 12.2 10 16 10C16.3 10 16.5 10 16.8 10.1C16.1 6.6 13.1 4 9.5 4Z" fill="white"/>
          <path d="M16 11C12.7 11 10 13.2 10 16C10 18.8 12.7 21 16 21C17 21 17.9 20.8 18.7 20.4L21 21.5L20.3 19.4C21.4 18.4 22 17.3 22 16C22 13.2 19.3 11 16 11Z" fill="white" fill-opacity="0.7"/>
        </svg>
        微信一键授权登录
      </button>
      
      <!-- Privacy -->
      <p style="text-align:center;font-size:12px;color:var(--td-text-3);line-height:1.6;margin:0;">
        登录即代表您同意
        <span style="color:var(--td-brand);">《用户服务协议》</span>
        与
        <span style="color:var(--td-brand);">《隐私政策》</span>
      </p>
    </div>
    
    <div style="flex:1"></div>
    <!-- Home Indicator -->
    <div style="width:134px;height:5px;background:#0D0D0D;border-radius:3px;opacity:0.2;margin-bottom:8px;"></div>
  </div>
</body>
</html>
