<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>员工管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --td-brand: #0052D9;
      --td-success: #00A870;
      --td-warning: #ED7B2F;
      --td-error: #E34D59;
      --td-bg-page: #F3F3F3;
      --td-bg-card: #FFFFFF;
      --td-text-1: #0D0D0D;
      --td-text-2: #4B4B4B;
      --td-text-3: #9A9A9A;
      --td-border: #E7E7E7;
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--td-bg-page);
      height: 852px; width: 393px;
      overflow: hidden;
    }
    .status-bar { height: 44px; background: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
    .nav-bar { height: 44px; background: white; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--td-border); }
    .tab-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 83px; background: var(--td-bg-card); border-top: 1px solid var(--td-border); display: flex; padding-bottom: 26px; }
    .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 4px; gap: 3px; }
    .tab-label { font-size: 10px; color: var(--td-text-3); }
    .tab-label.active { color: var(--td-brand); }
    .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .search-bar { display:flex;align-items:center;background:#F5F5F5;border-radius:8px;padding:8px 12px;gap:8px; }
    .filter-chip { padding:5px 12px;border-radius:16px;font-size:12px;border:1px solid var(--td-border);color:var(--td-text-2);background:var(--td-bg-card); }
    .filter-chip.active { background:#E8F0FD;color:var(--td-brand);border-color:var(--td-brand); }
  </style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <span style="font-size:15px;font-weight:600;color:var(--td-text-1);">9:41</span>
    <div style="display:flex;gap:6px;align-items:center;">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#0D0D0D"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#0D0D0D"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#0D0D0D"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#0D0D0D"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#0D0D0D" stroke-opacity="0.35"/><rect x="2" y="2" width="16" height="8" rx="2" fill="#0D0D0D"/></svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 6L9 12L15 18" stroke="#0052D9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span style="font-size:17px;font-weight:600;color:var(--td-text-1);flex:1;text-align:center;">员工管理</span>
    <div style="width:32px;height:32px;border-radius:8px;background:#E8F0FD;display:flex;align-items:center;justify-content:center;cursor:pointer;">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3V15M3 9H15" stroke="#0052D9" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div style="overflow-y:auto;height:calc(852px - 44px - 44px - 83px);">

    <!-- Search & Filter -->
    <div style="background:var(--td-bg-card);padding:12px 16px;border-bottom:1px solid var(--td-border);">
      <div class="search-bar" style="margin-bottom:10px;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#9A9A9A" stroke-width="1.5" fill="none"/><path d="M11 11L14 14" stroke="#9A9A9A" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span style="font-size:14px;color:var(--td-text-3);">搜索员工姓名</span>
      </div>
      <div style="display:flex;gap:8px;overflow-x:auto;">
        <span class="filter-chip active">全部 (42)</span>
        <span class="filter-chip">在职 (40)</span>
        <span class="filter-chip">管理员 (3)</span>
        <span class="filter-chip">已禁用 (2)</span>
      </div>
    </div>

    <!-- Members List -->
    <div style="padding:12px 16px;">
      
      <!-- Admin Group -->
      <div style="font-size:12px;color:var(--td-text-3);margin-bottom:8px;font-weight:500;display:flex;align-items:center;gap:6px;">
        <span>管理员 (3人)</span>
      </div>
      
      <div style="background:var(--td-bg-card);border-radius:10px;overflow:hidden;margin-bottom:12px;">
        <!-- Creator -->
        <div style="display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--td-border);">
          <div style="width:40px;height:40px;border-radius:20px;background:linear-gradient(135deg,#0052D9,#1E6EFF);display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:15px;font-weight:700;color:white;">陈</div>
          <div style="flex:1;">
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-size:14px;font-weight:600;color:var(--td-text-1);">陈总</span>
              <span style="background:#0052D9;color:white;font-size:10px;padding:1px 6px;border-radius:3px;">创始人</span>
            </div>
            <div style="font-size:11px;color:var(--td-text-3);margin-top:2px;">加入 2025-01-10 · 今日已签到</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <!-- Admin 1 -->
        <div style="display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--td-border);">
          <div style="width:40px;height:40px;border-radius:20px;background:#E8F0FD;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:15px;font-weight:700;color:#0052D9;">刘</div>
          <div style="flex:1;">
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-size:14px;font-weight:600;color:var(--td-text-1);">刘经理</span>
              <span style="background:#E8F0FD;color:#0052D9;font-size:10px;padding:1px 6px;border-radius:3px;">管理员</span>
            </div>
            <div style="font-size:11px;color:var(--td-text-3);margin-top:2px;">加入 2025-03-05 · 今日已签到</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <!-- Admin 2 -->
        <div style="display:flex;align-items:center;padding:12px 14px;">
          <div style="width:40px;height:40px;border-radius:20px;background:#E8F0FD;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:15px;font-weight:700;color:#0052D9;">何</div>
          <div style="flex:1;">
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-size:14px;font-weight:600;color:var(--td-text-1);">何主任</span>
              <span style="background:#E8F0FD;color:#0052D9;font-size:10px;padding:1px 6px;border-radius:3px;">管理员</span>
            </div>
            <div style="font-size:11px;color:var(--td-text-3);margin-top:2px;">加入 2025-04-15 · 今日已签到</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <!-- Employee Group -->
      <div style="font-size:12px;color:var(--td-text-3);margin-bottom:8px;font-weight:500;">在职员工 (37人)</div>
      
      <div style="background:var(--td-bg-card);border-radius:10px;overflow:hidden;margin-bottom:12px;">
        <div style="display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--td-border);">
          <div style="width:40px;height:40px;border-radius:20px;background:#D1F5E8;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:15px;font-weight:700;color:#00A870;">张</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:600;color:var(--td-text-1);">张三</div>
            <div style="font-size:11px;color:var(--td-text-3);margin-top:2px;">加入 2025-05-20 · 今日已签到</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            <span style="font-size:11px;color:var(--td-success);">正常</span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <div style="display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--td-border);">
          <div style="width:40px;height:40px;border-radius:20px;background:#FFE4D1;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:15px;font-weight:700;color:#ED7B2F;">李</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:600;color:var(--td-text-1);">李四</div>
            <div style="font-size:11px;color:var(--td-text-3);margin-top:2px;">加入 2025-06-01 · 今日迟到</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            <span style="font-size:11px;color:var(--td-warning);">迟到</span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <div style="display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--td-border);">
          <div style="width:40px;height:40px;border-radius:20px;background:#FDEAEA;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:15px;font-weight:700;color:#E34D59;">赵</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:600;color:var(--td-text-1);">赵六</div>
            <div style="font-size:11px;color:var(--td-text-3);margin-top:2px;">加入 2025-07-10 · 今日未签到</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            <span style="font-size:11px;color:var(--td-error);">缺卡</span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <div style="display:flex;align-items:center;padding:12px 14px;">
          <div style="width:40px;height:40px;border-radius:20px;background:#F5F5F5;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:15px;font-weight:700;color:#9A9A9A;">吴</div>
          <div style="flex:1;">
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-size:14px;font-weight:600;color:var(--td-text-3);">吴八</span>
              <span style="background:#F5F5F5;color:#9A9A9A;font-size:10px;padding:1px 6px;border-radius:3px;">已禁用</span>
            </div>
            <div style="font-size:11px;color:var(--td-text-3);margin-top:2px;">2026-01-20 禁用</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="#9A9A9A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <!-- Invite Button -->
      <button style="width:100%;background:var(--td-brand);color:white;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 4V16M4 10H16" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
        邀请员工加入
      </button>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 9L12 3L21 9V20C21 20.6 20.6 21 20 21H15V15H9V21H4C3.4 21 3 20.6 3 20V9Z" stroke="#9A9A9A" stroke-width="1.8" fill="none"/></svg>
      <span class="tab-label">首页</span>
    </div>
    <div class="tab-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M17 21V19C17 17.3 15.7 16 14 16H10C8.3 16 7 17.3 7 19V21" stroke="#0052D9" stroke-width="1.8" stroke-linecap="round" fill="none"/><circle cx="12" cy="9" r="4" fill="#0052D9"/></svg>
      <span class="tab-label active">员工管理</span>
    </div>
    <div class="tab-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="#9A9A9A" stroke-width="1.8" fill="none"/><path d="M8 2V6M16 2V6M3 10H21" stroke="#9A9A9A" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span class="tab-label">考勤总览</span>
    </div>
    <div class="tab-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="#9A9A9A" stroke-width="1.8" fill="none"/><path d="M12 2V4M12 20V22M2 12H4M20 12H22" stroke="#9A9A9A" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span class="tab-label">企业设置</span>
    </div>
  </div>
</body>
</html>
