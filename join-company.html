<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加入企业</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --td-brand: #0052D9;
      --td-success: #00A870;
      --td-bg-page: #F3F3F3;
      --td-bg-card: #FFFFFF;
      --td-text-1: #0D0D0D;
      --td-text-2: #4B4B4B;
      --td-text-3: #9A9A9A;
      --td-border: #E7E7E7;
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--td-bg-page);
      height: 852px; width: 393px;
      overflow: hidden;
    }
    .status-bar { height: 44px; background: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
    .nav-bar { height: 44px; background: white; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--td-border); }
    .input-field { width: 100%; border: 1.5px solid var(--td-border); border-radius: 8px; padding: 12px 14px; font-size: 15px; color: var(--td-text-1); outline: none; background: white; }
    .input-field:focus { border-color: var(--td-brand); }
    .tab-seg { flex: 1; padding: 9px; text-align: center; font-size: 14px; cursor: pointer; }
    .tab-seg.active { color: var(--td-brand); font-weight: 600; }
    .tab-seg:not(.active) { color: var(--td-text-2); }
  </style>
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar">
    <span style="font-size:15px;font-weight:600;color:var(--td-text-1);">9:41</span>
    <div style="display:flex;gap:6px;align-items:center;">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#0D0D0D"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#0D0D0D"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#0D0D0D"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#0D0D0D"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#0D0D0D" stroke-opacity="0.35"/><rect x="2" y="2" width="16" height="8" rx="2" fill="#0D0D0D"/></svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 6L9 12L15 18" stroke="#0052D9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span style="font-size:17px;font-weight:600;color:var(--td-text-1);flex:1;text-align:center;">加入企业</span>
    <div style="width:24px;"></div>
  </div>

  <!-- Scrollable Content -->
  <div style="overflow-y:auto;height:calc(852px - 44px - 44px);padding:20px 16px;">

    <!-- Tab Segment -->
    <div style="background:var(--td-bg-card);border-radius:10px;padding:4px;display:flex;margin-bottom:20px;border:1px solid var(--td-border);">
      <div class="tab-seg active" style="border-radius:8px;background:#E8F0FD;">
        <span>输入邀请码</span>
      </div>
      <div class="tab-seg">
        <span>扫码加入</span>
      </div>
    </div>

    <!-- Code Input Section -->
    <div style="background:var(--td-bg-card);border-radius:12px;padding:20px;">
      <div style="text-align:center;margin-bottom:24px;">
        <div style="width:80px;height:80px;background:linear-gradient(135deg,#E8F0FD,#C4D8FF);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
          <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
            <rect x="6" y="6" width="14" height="14" rx="3" stroke="#0052D9" stroke-width="2.5" fill="none"/>
            <rect x="6" y="24" width="14" height="14" rx="3" stroke="#0052D9" stroke-width="2.5" fill="none"/>
            <rect x="24" y="6" width="14" height="14" rx="3" stroke="#0052D9" stroke-width="2.5" fill="none"/>
            <circle cx="31" cy="31" r="4" fill="#0052D9"/>
            <path d="M37 25V29M25 37H29M37 33V37H33" stroke="#0052D9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="9" y="9" width="8" height="8" rx="1.5" fill="#0052D9"/>
            <rect x="9" y="27" width="8" height="8" rx="1.5" fill="#0052D9"/>
            <rect x="27" y="9" width="8" height="8" rx="1.5" fill="#0052D9"/>
          </svg>
        </div>
        <h3 style="margin:0 0 6px;font-size:16px;font-weight:600;color:var(--td-text-1);">输入企业邀请码</h3>
        <p style="margin:0;font-size:13px;color:var(--td-text-3);">请向企业管理员获取 6 位邀请码</p>
      </div>

      <!-- Code Input -->
      <div style="display:flex;gap:10px;justify-content:center;margin-bottom:20px;">
        <div style="width:44px;height:52px;border:1.5px solid var(--td-brand);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--td-brand);background:#E8F0FD;">A</div>
        <div style="width:44px;height:52px;border:1.5px solid var(--td-brand);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--td-brand);background:#E8F0FD;">8</div>
        <div style="width:44px;height:52px;border:1.5px solid var(--td-border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--td-text-3);background:#F9F9F9;">
          <div style="width:2px;height:24px;background:var(--td-brand);border-radius:1px;animation:blink 1s infinite;"></div>
        </div>
        <div style="width:44px;height:52px;border:1.5px solid var(--td-border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--td-text-3);background:#F9F9F9;"></div>
        <div style="width:44px;height:52px;border:1.5px solid var(--td-border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--td-text-3);background:#F9F9F9;"></div>
        <div style="width:44px;height:52px;border:1.5px solid var(--td-border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--td-text-3);background:#F9F9F9;"></div>
      </div>

      <!-- Join Button -->
      <button style="width:100%;background:var(--td-brand);color:white;border:none;border-radius:8px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;opacity:0.5;">确认加入</button>
      
      <p style="text-align:center;font-size:12px;color:var(--td-text-3);margin:12px 0 0;">邀请码为 6 位字母与数字组合</p>
    </div>

    <!-- Divider -->
    <div style="display:flex;align-items:center;gap:12px;margin:20px 0;">
      <div style="flex:1;height:1px;background:var(--td-border);"></div>
      <span style="font-size:12px;color:var(--td-text-3);">或者</span>
      <div style="flex:1;height:1px;background:var(--td-border);"></div>
    </div>

    <!-- Create Company -->
    <div style="background:var(--td-bg-card);border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;">
      <div style="width:48px;height:48px;background:#E8F7F2;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><path d="M13 4V22M4 13H22" stroke="#00A870" stroke-width="2.5" stroke-linecap="round"/></svg>
      </div>
      <div style="flex:1;">
        <div style="font-size:15px;font-weight:600;color:var(--td-text-1);margin-bottom:3px;">创建新企业</div>
        <div style="font-size:12px;color:var(--td-text-3);">成为企业发起者，邀请成员加入</div>
      </div>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 5L11 9L7 13" stroke="#9A9A9A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>

    <!-- Home Indicator -->
    <div style="display:flex;justify-content:center;padding:24px 0 8px;">
      <div style="width:134px;height:5px;background:#0D0D0D;border-radius:3px;opacity:0.15;"></div>
    </div>
  </div>

  <style>
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</body>
</html>
